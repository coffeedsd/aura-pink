<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { font-family: sans-serif; font-size: 24px; padding: 20px; background: #fff1f5; }
#info { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
</style>
</head>
<body>
<h2>Viewport Debug</h2>
<div id="info"></div>
<script>
function update() {
  document.getElementById('info').innerHTML = `
    <b>window.innerWidth:</b> ${window.innerWidth}px<br>
    <b>window.innerHeight:</b> ${window.innerHeight}px<br>
    <b>screen.width:</b> ${screen.width}px<br>
    <b>devicePixelRatio:</b> ${window.devicePixelRatio}<br>
    <b>document.body.clientWidth:</b> ${document.body.clientWidth}px
  `;
}
update();
window.addEventListener('resize', update);
</script>
</body>
</html>
