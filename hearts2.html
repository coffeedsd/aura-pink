<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hearts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}
.stage {
  width: 100vw;
  height: 100vh;
  background: linear-gradient(160deg, #FFB7CC 0%, #FFC9D8 40%, #FFDEE8 70%, #FFF1F5 100%);
  position: relative;
  overflow: hidden;
}
.h {
  position: absolute;
  font-family: 'Playfair Display', Georgia, serif;
  user-select: none;
  pointer-events: none;
  opacity: 0;
  animation: floatUp ease-in-out infinite;
  line-height: 1;
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(var(--r)); opacity: 0; }
  12%  { opacity: var(--o); }
  80%  { opacity: var(--o); }
  100% { transform: translateY(-110vh) rotate(calc(var(--r) + 15deg)); opacity: 0; }
}
</style>
</head>
<body>
<div class="stage" id="stage"></div>
<script>
const stage = document.getElementById('stage');
const colors = ['#fff','#FFB7CC','#F4A0BC','#E8849E','#FFDEE8','#fff0f4'];
const sizes  = [28,42,58,72,90,110,140,170,200];

function spawn() {
  const el = document.createElement('div');
  el.className = 'h';
  el.textContent = '♡';
  const size  = sizes[Math.floor(Math.random() * sizes.length)];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const left  = 2 + Math.random() * 92;
  const dur   = 5 + Math.random() * 9;
  const delay = Math.random() * -14;
  const rot   = (Math.random() - 0.5) * 30;
  const op    = 0.2 + Math.random() * 0.6;
  el.style.cssText = `font-size:${size}px;color:${color};left:${left}%;bottom:-${size+20}px;--r:${rot}deg;--o:${op};animation-duration:${dur}s;animation-delay:${delay}s;`;
  stage.appendChild(el);
  setTimeout(() => el.remove(), (dur+15)*1000);
}

for (let i = 0; i < 45; i++) spawn();
setInterval(spawn, 420);
</script>
</body>
</html>
